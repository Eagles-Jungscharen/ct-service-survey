name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-shared:
    runs-on: ubuntu-latest
    name: Build Shared Package
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build shared package
        run: npm run build:shared
      
      - name: Upload shared artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shared-dist
          path: packages/shared/dist/

  build-frontend:
    runs-on: ubuntu-latest
    name: Build Frontend
    needs: build-shared
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Download shared artifacts
        uses: actions/download-artifact@v4
        with:
          name: shared-dist
          path: packages/shared/dist/
      
      - name: Lint frontend
        run: npm run lint --workspace=@ct-service-survey/frontend
      
      - name: Build frontend
        run: npm run build:frontend
      
      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: packages/frontend/dist/

  build-backend:
    runs-on: ubuntu-latest
    name: Build Backend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Restore backend dependencies
        run: dotnet restore packages/backend/ct-service-survey-azfunctions.csproj
      
      - name: Build backend
        run: dotnet build packages/backend/ct-service-survey-azfunctions.csproj --configuration Release --no-restore
      
      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: packages/backend/bin/Release/

